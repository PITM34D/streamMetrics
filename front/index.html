<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-withh, initial-scale=1.0">
    <title>StreamMetrics Dashboard</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1>StreamMetrics</h1>
                <p>Dasboard de analitica de comportamiento</p>
            </div>
        </header>

        <main class="dashboard-main">
            <section class="filters-section">
                <h2>Filtros</h2>
                <p>Añadir filtros por fecha</p>
            </section>

            <section class="kpi-section">
                <h2>Indicadores principales</h2>
                <div class="kpi-grid">
                    <article class="kpi-card">
                        <h3>Usuarios activos</h3>
                        <p id="active-users-value">--</p>
                    </article>
                    <article class="kpi-card">
                        <h3>Total de eventos</h3>
                        <p id="total-events-value">--</p>
                    </article>
                </div>
            </section>

            <section class="chart-section" id="events-chart-container">
                <h2>Evolución de eventos</h2>
                <div class="chart-box">
                    <p>Gráfica temporal aquí</p>
                </div>
            </section>
            
            <section class="rankings-section">
                <h2>Rankings</h2>

                <div class="rankings-grid">
                    <article class="rankings-card">
                        <h3>Top páginas</h3>
                        <ul id="top-pages-list">
                            <li>Sin datos</li>
                        </ul>
                    </article>
                    <article class="rankings-card">
                        <h3>Top títulos</h3>
                        <ul id="top-titles-list">
                            <li>Sin datos</li>
                        </ul>
                    </article>
                </div>
            </section>
        </main>
    </div>


    <script src="./js/app.js"></script>
    
</body>
</html>
