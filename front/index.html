<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamMetrics Dashboard</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="shortcut icon" href="/front/assets/imgs/icono.png" type="image/x-icon">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header-container">
            <div class="dashboard-header-content">
                <div class="dashboard-logo-card">
                    <img src="/front/assets/imgs/logo.png" alt="Logo de StreamMetrics" class="dashboard-logo">
                </div>
                <div class="dashboard-header-text">
                    <p class="dashboard-subtitle">Dasboard de analitica de comportamiento</p>
                </div>
            </div>

        </header>

        <main class="dashboard-main">
            <section class="filters-section">
                <h2>Filtros</h2>
                <div class="filters-form">
                    <div class="filter-group">
                        <label for="from-date">Desde</label>
                        <input type="date" name="" id="from-date">
                    </div>
                    <div class="filter-group">
                        <label for="to-date">Hasta</label>
                        <input type="date" name="" id="to-date">
                    </div>

                    <div class="filter-actions">
                        <button id="apply-filters-btn" type="button">Aplicar filtros</button>
                        <button id="reset-filters-btn" type="button">Limpiar</button>
                    </div>
                    <p id="filters-error" class="filters-error"></p>
                </div>
            </section>

            <section class="kpi-section">
                <h2>Indicadores principales</h2>
                <div class="kpi-grid">
                    <article class="kpi-card">
                        <h3>Usuarios activos</h3>
                        <p id="active-users-value">--</p>
                    </article>
                    <article class="kpi-card">
                        <h3>Total de eventos</h3>
                        <p id="total-events-value">--</p>
                    </article>
                </div>
            </section>

            <section class="chart-section">
                <h2>Evolución de eventos</h2>
                <div class="chart-box" id="events-chart-container">
                    <p>Gráfica temporal aquí</p>
                </div>
            </section>
            
            <section class="ranking-section">
                <h2>Rankings</h2>

                <div class="ranking-grid">
                    <article class="ranking-card">
                        <h3>Top páginas</h3>
                        <ul id="top-pages-list">
                            <li>Sin datos</li>
                        </ul>
                    </article>
                    <article class="ranking-card">
                        <h3>Top títulos</h3>
                        <ul id="top-titles-list">
                            <li>Sin datos</li>
                        </ul>
                    </article>
                </div>
            </section>
        </main>
    </div>


    <script src="./js/app.js"></script>
    
</body>
</html>
